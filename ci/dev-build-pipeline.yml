variables:
- name: BUILD_STAGING_DIR
  value: '$(System.DefaultWorkingDirectory)/build-staging-directory'
- name: SERVICE_CONNECTION
  value: 'SC_CRX_APP_INT_PRO_GWC_ARM'
- name: REGISTRY_NAME
  value: 'crdprointothergwcacr01'

resources:
  repositories:
  - repository: helm-charts
    type: git
    name: "CreditasGroup.CRX-helm-charts"
  - repository: versioningTemplates
    name: CreditasGroup.DevOps.ADO.Shared-Pipeline-Templates-APP/git-version
    type: git
    ref: refs/tags/0.8.1

trigger:
  branches:
    include:
      - main
  paths:
    exclude:
      - ci/*

pool: POOL_CRX_APP_GWC_BUILD

stages:
- stage: ApplicationBuild
  displayName: "Application Build"
  jobs:
  - job: buildApp
    displayName: "Application Build"
    steps:
    - template: templates/build-app.yml
      parameters:
        BUILD_STAGING_DIR: $(BUILD_STAGING_DIR)

    # Build Docker image
    - task: AzureCLI@2
      displayName: 'ACR Login'
      inputs:
        azureSubscription: $(SERVICE_CONNECTION)
        scriptType: "bash"
        scriptLocation: "inlineScript"
        inlineScript: |
          az acr login --name $(REGISTRY_NAME).azurecr.io
    
    - task: Bash@3
      displayName: 'Build Docker Image'
      inputs:
        targetType: "inline"
        script: |
          docker build -t $(REGISTRY_NAME).azurecr.io/crx-gt2birt:$(GitVersion.FullSemVer) .
        workingDirectory: $(Build.SourcesDirectory)/$(Build.Repository.Name)
    
    - task: Bash@3
      displayName: 'Push Docker Image'
      inputs:
        targetType: "inline"
        script: |
          docker push $(REGISTRY_NAME).azurecr.io/crx-gt2birt:$(GitVersion.FullSemVer)
        workingDirectory: $(Build.SourcesDirectory)/$(Build.Repository.Name)

- stage: HelmChartUpdate
  displayName: "Helm Chart Update"
  dependsOn: ApplicationBuild
  jobs:
  - job: updateImageVersion
    displayName: "Update Image Version"
    steps:
    - template: templates/update-helm-chart.yml
      parameters:
        chartName: "gt2birt"
        targetValuesFile: "values.yaml"
