stages:
- stage: ApplicationBuild
  displayName: "Application Build"
  jobs:
  - job: buildApp
    displayName: "Application Build"
    steps:
    - template: templates/build-app.yml
      parameters:
        BUILD_STAGING_DIR: $(BUILD_STAGING_DIR)

    # Build Docker image
    - task: AzureCLI@2
      inputs:
        azureSubscription: $(SERVICE_CONNECTION)
        scriptType: "bash"
        scriptLocation: "inlineScript"
        inlineScript: |
          az acr login --name $(REGISTRY_NAME).azurecr.io
    
    - task: Bash@3
      inputs:
        targetType: "inline"
        script: |
          docker build -t $(REGISTRY_NAME).azurecr.io/gt2birt:$(GitVersion.FullSemVer) .
    
    - task: Bash@3
      inputs:
        targetType: "inline"
        script: |
          docker push $(REGISTRY_NAME).azurecr.io/gt2birt:$(GitVersion.FullSemVer)

    # Cleanup
    - task: DeleteFiles@1
      inputs:
        Contents: '**/*'

